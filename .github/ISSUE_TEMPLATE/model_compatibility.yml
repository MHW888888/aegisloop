name: Model compatibility report
description: Report whether a ChatGPT model follows the AegisLoop codex block contract
title: "[Model]: "
labels: ["compatibility", "model"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for model-specific behavior such as "GPT-5.6 started built-in Codex instead of returning a visible block" or "5.5 emits a valid codex block".

        Please do not post tokens, real conversation ids, private local paths, screenshots with secrets, ads, payment links, or wallet addresses.
  - type: input
    id: model
    attributes:
      label: Model / mode tested
      placeholder: "Example: GPT-5.6 Sol, Terra, Luna, Ultra, GPT-5.5, GPT-5.4, GPT-5.3, o3"
    validations:
      required: true
  - type: dropdown
    id: result
    attributes:
      label: Result
      options:
        - "Pass: valid codex block on first try"
        - "Warn: valid after correction prompt"
        - "Fail: cannot produce valid codex block after nudges"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Test steps
      description: Use docs/model-compatibility.md if possible.
      placeholder: |
        1. Started local bridge
        2. Opened fresh runner thread
        3. Selected model ...
        4. Used starter text
        5. Clicked Arm one run
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: Describe whether the model emitted a codex block, started built-in Codex, claimed no tool was available, or needed a correction prompt.
    validations:
      required: true
  - type: checkboxes
    id: route-invariant
    attributes:
      label: Route invariant checks
      description: Model changes should not change the local Codex route when the ChatGPT conversation URL stays the same.
      options:
        - label: "The ChatGPT conversation URL stayed the same while switching models"
        - label: "The extension panel kept the same local Codex session binding"
        - label: "No reconnect or config change was performed during the model switch"
  - type: textarea
    id: sanitized-output
    attributes:
      label: Sanitized output excerpt
      description: Optional. Remove conversation ids, local paths, tokens, and private workspace content.
      render: text
