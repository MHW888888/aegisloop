name: Feature request
description: Suggest a focused improvement for AegisLoop
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow pain does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Keep it small and local-first.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety notes
      description: Does this affect local authority, workspace writes, gates, or audit logs?
