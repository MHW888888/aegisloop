name: Feature request
description: Suggest a focused improvement for AegisLoop
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a focused improvement.

        Please do not post ads, payment links, wallet addresses, generic AI-generated analysis, tokens, real conversation ids, or private local paths. Spam or solicitation may be deleted.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow pain does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Keep it small and local-first.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety notes
      description: Does this affect local authority, workspace writes, gates, or audit logs?
